<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI漫画 - 登录/注册</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary-50: #f8f8f8;
        --primary-100: #f0f0f0;
        --primary-200: #e0e0e0;
        --primary-300: #c8c8c8;
        --primary-400: #a0a0a0;
        --primary-500: #808080;
        --primary-600: #606060;
        --primary-700: #404040;
        --primary-800: #282828;
        --primary-900: #181818;

        --accent-50: #fff9f2;
        --accent-100: #fff0e3;
        --accent-200: #ffe0c0;
        --accent-300: #ffcc99;
        --accent-400: #ffb366;
        --accent-500: #ff9933;
        --accent-600: #e68a2e;
        --accent-700: #cc7a29;
        --accent-800: #b36b24;
        --accent-900: #995c1f;

        --art-50: #f5f8f5;
        --art-100: #e8f0e8;
        --art-200: #d0e0d0;
        --art-300: #b8d0b8;
        --art-400: #90b890;
        --art-500: #68a068;
        --art-600: #508850;
        --art-700: #387038;
        --art-800: #205820;
        --art-900: #084008;

        --neutral-50: #fafafa;
        --neutral-100: #f5f5f5;
        --neutral-200: #eeeeee;
        --neutral-300: #e0e0e0;
        --neutral-400: #bdbdbd;
        --neutral-500: #9e9e9e;
        --neutral-600: #757575;
        --neutral-700: #616161;
        --neutral-800: #424242;
        --neutral-900: #212121;

        --rank-gold: #ffb366;
        --rank-silver: #a0a0a0;
        --rank-bronze: #cc7a29;

        --bg-primary: #ffffff;
        --bg-secondary: #fafafa;
        --text-primary: #212121;
        --text-secondary: #757575;
        --border: #e0e0e0;

        --primary: #808080;
        --secondary: #ff9933;
        --accent-1: #ff9933;
        --accent-2: #387038;
        --success: #387038;
        --warning: #ff9933;
        --error: #cc7a29;
        --info: #68a068;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        line-height: 1.6;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* Header */
      .header {
        background: linear-gradient(
          135deg,
          var(--primary-700),
          var(--primary-800)
        );
        padding: 20px 0;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      }

      .header-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        font-size: 28px;
        font-weight: 800;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-icon {
        width: 45px;
        height: 45px;
        background: white;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary-700);
        font-size: 24px;
      }

      /* Login Container */
      .login-container {
        min-height: calc(100vh - 160px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 0;
      }

      .login-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 50px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        width: 100%;
        max-width: 900px;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .login-image {
        background: linear-gradient(
          135deg,
          var(--primary-700),
          var(--primary-800)
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      .login-image::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url("https://picsum.photos/600/800?random=100") center/cover;
        opacity: 0.2;
      }

      .login-image-content {
        position: relative;
        z-index: 1;
        text-align: center;
        color: white;
      }

      .login-image-content h2 {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 20px;
      }

      .login-image-content p {
        font-size: 16px;
        opacity: 0.9;
        margin-bottom: 40px;
      }

      .login-features {
        list-style: none;
        text-align: left;
      }

      .login-feature {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        font-size: 14px;
        opacity: 0.9;
      }

      .login-feature i {
        width: 24px;
        height: 24px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
      }

      .login-form {
        padding: 60px 50px;
      }

      .form-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .form-title {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 10px;
      }

      .form-subtitle {
        color: var(--text-secondary);
        font-size: 14px;
      }

      .form-tabs {
        display: flex;
        margin-bottom: 30px;
        border-bottom: 1px solid var(--border);
      }

      .form-tab {
        flex: 1;
        padding: 15px 0;
        text-align: center;
        font-weight: 600;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.3s;
        border-bottom: 2px solid transparent;
      }

      .form-tab.active {
        color: var(--primary-600);
        border-bottom-color: var(--primary-600);
      }

      .form-content {
        display: none;
      }

      .form-content.active {
        display: block;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 8px;
      }

      .form-input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid var(--border);
        border-radius: 10px;
        font-size: 15px;
        transition: all 0.3s;
      }

      .form-input:focus {
        outline: none;
        border-color: var(--primary-500);
        box-shadow: 0 0 0 3px rgba(96, 96, 96, 0.1);
      }

      .form-input::placeholder {
        color: var(--text-secondary);
      }

      .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        font-size: 14px;
      }

      .form-checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .form-checkbox input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--primary-600);
      }

      .form-link {
        color: var(--primary-600);
        text-decoration: none;
        transition: color 0.3s;
      }

      .form-link:hover {
        color: var(--primary-700);
        text-decoration: underline;
      }

      .form-button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(
          135deg,
          var(--primary-600),
          var(--primary-700)
        );
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-bottom: 20px;
      }

      .form-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .form-divider {
        display: flex;
        align-items: center;
        margin: 30px 0;
      }

      .form-divider::before,
      .form-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .form-divider span {
        padding: 0 20px;
        font-size: 14px;
        color: var(--text-secondary);
      }

      .social-login {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
      }

      .social-button {
        flex: 1;
        padding: 12px;
        border: 2px solid var(--border);
        border-radius: 10px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.3s;
      }

      .social-button:hover {
        border-color: var(--primary-500);
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      }

      .social-button i {
        font-size: 18px;
      }

      .social-button.wechat {
        color: #07c160;
      }

      .social-button.qq {
        color: #1da1f2;
      }

      .social-button.weibo {
        color: #e6162d;
      }

      /* Footer */
      .footer {
        background: var(--primary-900);
        color: white;
        padding: 40px 0 20px;
      }

      .footer-content {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr 1fr;
        gap: 40px;
        margin-bottom: 30px;
      }

      .footer-brand .logo {
        margin-bottom: 15px;
      }

      .footer-brand p {
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.8;
      }

      .footer-column h4 {
        font-size: 16px;
        margin-bottom: 20px;
        color: white;
      }

      .footer-column ul {
        list-style: none;
      }

      .footer-column li {
        margin-bottom: 12px;
      }

      .footer-column a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 14px;
        transition: color 0.3s;
      }

      .footer-column a:hover {
        color: var(--accent-500);
      }

      .footer-bottom {
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
      }

      /* Responsive */
      @media (max-width: 992px) {
        .login-card {
          grid-template-columns: 1fr;
          max-width: 500px;
        }

        .login-image {
          display: none;
        }

        .login-form {
          padding: 40px 30px;
        }

        .footer-content {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 768px) {
        .header-content {
          flex-direction: column;
          gap: 15px;
          text-align: center;
        }

        .login-form {
          padding: 30px 20px;
        }

        .form-title {
          font-size: 24px;
        }

        .social-login {
          flex-direction: column;
        }

        .footer-content {
          grid-template-columns: 1fr;
          gap: 30px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Login Container -->
    <div class="login-container">
      <div class="container">
        <div class="login-card">
          <!-- Login Image -->
          <div class="login-image">
            <div class="login-image-content">
              <h2>欢迎来到 AI漫画</h2>
              <p>探索无限精彩的漫画世界，开启您的阅读之旅</p>
              <ul class="login-features">
                <li class="login-feature">
                  <i class="fas fa-book"></i>
                  <span>海量漫画资源，每日更新</span>
                </li>
                <li class="login-feature">
                  <i class="fas fa-mobile-alt"></i>
                  <span>多设备同步，随时随地阅读</span>
                </li>
                <li class="login-feature">
                  <i class="fas fa-user"></i>
                  <span>个性化推荐，发现更多精彩</span>
                </li>
                <li class="login-feature">
                  <i class="fas fa-comment"></i>
                  <span>社区互动，分享阅读感受</span>
                </li>
              </ul>
            </div>
          </div>

          <!-- Login Form -->
          <div class="login-form">
            <div class="form-header">
              <h2 class="form-title">账号登录</h2>
              <p class="form-subtitle">登录后享受更多优质内容</p>
            </div>

            <div class="form-tabs">
              <div class="form-tab active" data-tab="login">登录</div>
              <div class="form-tab" data-tab="register">注册</div>
            </div>

            <!-- Login Form Content -->
            <div class="form-content active" id="login">
              <div class="form-group">
                <label class="form-label">手机号</label>
                <input
                  type="text"
                  class="form-input"
                  placeholder="请输入手机号"
                />
              </div>
              <div class="form-group">
                <label class="form-label">密码</label>
                <input
                  type="password"
                  class="form-input"
                  placeholder="请输入密码"
                />
              </div>
              <div class="form-options">
                <div class="form-checkbox">
                  <input type="checkbox" id="remember" />
                  <label for="remember">记住我</label>
                </div>
                <a href="#" class="form-link">忘记密码？</a>
              </div>
              <button
                class="form-button"
                onclick="window.location.href = 'Home.html'"
              >
                登录
              </button>
            </div>

            <!-- Register Form Content -->
            <div class="form-content" id="register">
              <div class="form-group">
                <label class="form-label">手机号</label>
                <input
                  type="tel"
                  class="form-input"
                  placeholder="请输入手机号"
                />
              </div>

              <div class="form-group">
                <label class="form-label">设置密码</label>
                <input
                  type="password"
                  class="form-input"
                  placeholder="请设置6-20位密码"
                />
              </div>
              <div class="form-group">
                <label class="form-label">确认密码</label>
                <input
                  type="password"
                  class="form-input"
                  placeholder="请再次输入密码"
                />
              </div>
              <div class="form-checkbox">
                <input type="checkbox" id="agreement" />
                <label for="agreement"
                  >我已阅读并同意 <a href="#" class="form-link">用户协议</a> 和
                  <a href="#" class="form-link">隐私政策</a></label
                >
              </div>
              <button class="form-button">注册</button>
                class="form-button"
                onclick="window.location.href = 'Home.html'"
              >
                注册
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 标签切换
      document.querySelectorAll(".form-tab").forEach((tab) => {
        tab.addEventListener("click", function () {
          // 移除所有标签的active类
          document
            .querySelectorAll(".form-tab")
            .forEach((t) => t.classList.remove("active"));
          // 添加当前标签的active类
          this.classList.add("active");

          // 隐藏所有表单内容
          document.querySelectorAll(".form-content").forEach((content) => {
            content.classList.remove("active");
          });

          // 显示对应表单内容
          const tabId = this.getAttribute("data-tab");
          document.getElementById(tabId).classList.add("active");
        });
      });
    </script>
  </body>
</html>
